name: Deploy to Azure

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  NODE_VERSION: '20.x'

jobs:
  build-and-deploy-backend:
    runs-on: ubuntu-latest
    name: Build and Deploy Backend
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: backend/package-lock.json
    
    - name: Install dependencies
      working-directory: ./backend
      run: npm ci
    
    - name: Build application
      working-directory: ./backend
      run: |
        npm run build
        echo "--- dist/ contents after build ---"
        ls -la dist/ || echo "dist/ not found!"
        ls -la dist/index.js && echo "dist/index.js EXISTS" || echo "dist/index.js NOT FOUND"
    
    - name: Install production dependencies
      working-directory: ./backend
      run: |
        rm -rf node_modules
        npm ci --production
    
    - name: Create deployment package
      working-directory: ./backend
      run: |
        echo "--- Verifying dist/ before packaging ---"
        ls -la dist/
        mkdir -p ../backend-deploy
        cp -r dist ../backend-deploy/
        cp -r node_modules ../backend-deploy/
        cp package*.json ../backend-deploy/
        cd ../backend-deploy
        zip -r ../backend-deploy.zip .
        echo "--- ZIP created ---"
        ls -la ../backend-deploy.zip
    
    - name: Deploy to Azure Web App
      uses: azure/webapps-deploy@v2
      with:
        app-name: ${{ secrets.AZURE_BACKEND_APP_NAME }}
        publish-profile: ${{ secrets.AZURE_BACKEND_PUBLISH_PROFILE }}
        package: backend-deploy.zip

  build-and-deploy-frontend:
    runs-on: ubuntu-latest
    name: Build and Deploy Frontend
    
    steps:
    - uses: actions/checkout@v3
      with:
        submodules: true
    
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
    
    - name: Install dependencies
      working-directory: ./frontend
      run: npm ci
    
    - name: Build application
      working-directory: ./frontend
      env:
        VITE_API_URL: ${{ secrets.VITE_API_URL }}
        VITE_WS_URL: ${{ secrets.VITE_WS_URL }}
      run: npm run build
    
    - name: Deploy to Azure Static Web Apps
      uses: Azure/static-web-apps-deploy@v1
      with:
        azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        action: "upload"
        app_location: "/frontend/dist"
        output_location: ""
        skip_app_build: true
