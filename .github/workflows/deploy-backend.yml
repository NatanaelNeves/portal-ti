name: Deploy Backend to Azure Web App  # triggered after secrets configured

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

concurrency:
  group: deploy-backend
  cancel-in-progress: true

env:
  NODE_VERSION: '20.x'

jobs:
  build-and-deploy-backend:
    runs-on: ubuntu-latest
    name: Build and Deploy Backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: ./backend
        run: npm ci

      - name: Build TypeScript
        working-directory: ./backend
        run: |
          npm run build
          echo "=== dist/ contents ==="
          ls -la dist/
          ls dist/index.js && echo "dist/index.js OK" || (echo "dist/index.js MISSING" && exit 1)

      - name: Install production dependencies only
        working-directory: ./backend
        run: |
          rm -rf node_modules
          npm ci --omit=dev

      - name: Package deployment artifact
        run: |
          mkdir -p backend-deploy
          cp -r backend/dist         backend-deploy/
          cp -r backend/node_modules backend-deploy/
          cp backend/package*.json   backend-deploy/
          [ -f backend/web.config ] && cp backend/web.config backend-deploy/
          cd backend-deploy
          zip -r ../backend-deploy.zip .
          echo "=== Artifact size ==="
          ls -lh ../backend-deploy.zip

      - name: Configure Azure App Settings via Kudu
        env:
          KUDU_USER: ${{ secrets.AZURE_KUDU_USER }}
          KUDU_PASS: ${{ secrets.AZURE_KUDU_PASS }}
        run: |
          echo "=== Setting app config ==="
          curl -s -X POST \
            "https://portal-ti-backend.scm.azurewebsites.net/api/settings" \
            --user "${KUDU_USER}:${KUDU_PASS}" \
            -H "Content-Type: application/json" \
            -d '{
              "CORS_ORIGIN":"https://green-ocean-096bd050f.2.azurestaticapps.net",
              "SCM_DO_BUILD_DURING_DEPLOYMENT":"false",
              "WEBSITE_RUN_FROM_PACKAGE":"0"
            }' \
            -w "\nHTTP Status: %{http_code}\n"

      - name: Deploy via VFS + Command (bypasses deployment lock)
        env:
          KUDU_USER: ${{ secrets.AZURE_KUDU_USER }}
          KUDU_PASS: ${{ secrets.AZURE_KUDU_PASS }}
        run: |
          SCM="https://portal-ti-backend.scm.azurewebsites.net"
          
          echo "=== Step 1: Upload zip via VFS API (bypasses deploy engine) ==="
          HTTP_CODE=$(curl -s -o /tmp/upload-resp.txt -w "%{http_code}" \
            -X PUT \
            "${SCM}/api/vfs/tmp/backend-deploy.zip" \
            --user "${KUDU_USER}:${KUDU_PASS}" \
            -H "If-Match: *" \
            --data-binary @backend-deploy.zip)
          echo "Upload HTTP: $HTTP_CODE"
          cat /tmp/upload-resp.txt 2>/dev/null || true
          echo ""
          if [ "$HTTP_CODE" != "200" ] && [ "$HTTP_CODE" != "201" ] && [ "$HTTP_CODE" != "204" ]; then
            echo "Upload failed!"
            exit 1
          fi
          echo "Zip uploaded to /tmp/backend-deploy.zip on server"
          
          echo "=== Step 2: Clean wwwroot + unzip via Command API ==="
          HTTP_CODE=$(curl -s -o /tmp/cmd-resp.txt -w "%{http_code}" \
            -X POST \
            "${SCM}/api/command" \
            --user "${KUDU_USER}:${KUDU_PASS}" \
            -H "Content-Type: application/json" \
            -d '{"command":"rm -rf /home/site/wwwroot/* && cd /tmp && unzip -o backend-deploy.zip -d /home/site/wwwroot/ && ls -la /home/site/wwwroot/ && echo DEPLOY_OK","dir":"/tmp"}')
          echo "Command HTTP: $HTTP_CODE"
          cat /tmp/cmd-resp.txt 2>/dev/null || true
          echo ""
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Unzip command failed!"
            exit 1
          fi
          
          # Verify deploy
          if grep -q "DEPLOY_OK" /tmp/cmd-resp.txt; then
            echo "Files deployed to wwwroot successfully!"
          else
            echo "Warning: DEPLOY_OK marker not found in output"
            cat /tmp/cmd-resp.txt
          fi
          
          echo "=== Step 3: Restart app by killing main process ==="
          curl -s -X DELETE \
            "${SCM}/api/processes/0" \
            --user "${KUDU_USER}:${KUDU_PASS}" \
            -w "\nRestart HTTP: %{http_code}\n" || true
          
          echo "=== Step 4: Wait and verify app is running ==="
          sleep 20
          for i in 1 2 3 4 5; do
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" \
              "https://portal-ti-backend.azurewebsites.net/api/health" \
              --max-time 10)
            echo "Health check $i: HTTP $HTTP"
            if [ "$HTTP" = "200" ]; then
              echo "App is running!"
              exit 0
            fi
            sleep 10
          done
          echo "App may still be starting — check https://portal-ti-backend.azurewebsites.net"
          echo "Deploy files were placed successfully. App will start when Azure warms up the container."
