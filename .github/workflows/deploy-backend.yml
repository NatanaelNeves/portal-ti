name: Deploy Backend to Azure Web App  # triggered after secrets configured

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

concurrency:
  group: deploy-backend
  cancel-in-progress: true

env:
  NODE_VERSION: '20.x'

jobs:
  build-and-deploy-backend:
    runs-on: ubuntu-latest
    name: Build and Deploy Backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: ./backend
        run: npm ci

      - name: Build TypeScript
        working-directory: ./backend
        run: |
          npm run build
          echo "=== dist/ contents ==="
          ls -la dist/
          ls dist/index.js && echo "dist/index.js OK" || (echo "dist/index.js MISSING" && exit 1)

      - name: Install production dependencies only
        working-directory: ./backend
        run: |
          rm -rf node_modules
          npm ci --omit=dev

      - name: Package deployment artifact
        run: |
          mkdir -p backend-deploy
          cp -r backend/dist         backend-deploy/
          cp -r backend/node_modules backend-deploy/
          cp backend/package*.json   backend-deploy/
          cd backend-deploy
          zip -r ../backend-deploy.zip .
          echo "=== Artifact size ==="
          ls -lh ../backend-deploy.zip

      - name: Deploy to Azure Web App (Kudu ZIP deploy)
        env:
          KUDU_USER: ${{ secrets.AZURE_KUDU_USER }}
          KUDU_PASS: ${{ secrets.AZURE_KUDU_PASS }}
        run: |
          for attempt in 1 2 3 4 5 6 7 8; do
            echo "=== Deploy attempt $attempt ==="
            HTTP_CODE=$(curl -s -o /tmp/deploy-response.txt -w "%{http_code}" \
              -X POST \
              "https://portal-ti-backend.scm.azurewebsites.net/api/zipdeploy" \
              --user "${KUDU_USER}:${KUDU_PASS}" \
              --data-binary @backend-deploy.zip \
              -H "Content-Type: application/zip")
            echo "HTTP Status: $HTTP_CODE"
            cat /tmp/deploy-response.txt || true
            if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "202" ]; then
              echo "Deploy succeeded!"
              exit 0
            elif [ "$HTTP_CODE" = "409" ]; then
              echo "Another deployment in progress — waiting 60s before retry..."
              sleep 60
            else
              echo "Unexpected status $HTTP_CODE — aborting."
              exit 1
            fi
          done
          echo "All attempts failed (409 persists)."
          exit 1
