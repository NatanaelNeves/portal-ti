name: Deploy Backend to Azure Web App  # triggered after secrets configured

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

env:
  NODE_VERSION: '20.x'
  AZURE_WEBAPP_NAME: portal-ti-backend

jobs:
  build-and-deploy-backend:
    runs-on: ubuntu-latest
    name: Build and Deploy Backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: ./backend
        run: npm ci

      - name: Build TypeScript
        working-directory: ./backend
        run: |
          npm run build
          echo "=== dist/ contents ==="
          ls -la dist/
          ls dist/index.js && echo "dist/index.js OK" || (echo "dist/index.js MISSING" && exit 1)

      - name: Install production dependencies only
        working-directory: ./backend
        run: |
          rm -rf node_modules
          npm ci --omit=dev

      - name: Package deployment artifact
        run: |
          mkdir -p backend-deploy
          cp -r backend/dist         backend-deploy/
          cp -r backend/node_modules backend-deploy/
          cp backend/package*.json   backend-deploy/
          cd backend-deploy
          zip -r ../backend-deploy.zip .
          echo "=== Artifact size ==="
          ls -lh ../backend-deploy.zip

      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Azure Web App
        run: |
          az webapp deploy \
            --name ${{ env.AZURE_WEBAPP_NAME }} \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --src-path backend-deploy.zip \
            --type zip \
            --async false

      - name: Azure logout
        if: always()
        run: az logout
