name: Deploy Backend to Azure Web App  # triggered after secrets configured

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

concurrency:
  group: deploy-backend
  cancel-in-progress: true

env:
  NODE_VERSION: '20.x'

jobs:
  build-and-deploy-backend:
    runs-on: ubuntu-latest
    name: Build and Deploy Backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: ./backend
        run: npm ci

      - name: Build TypeScript
        working-directory: ./backend
        run: |
          npm run build
          echo "=== dist/ contents ==="
          ls -la dist/
          ls dist/index.js && echo "dist/index.js OK" || (echo "dist/index.js MISSING" && exit 1)

      - name: Prepare deployment artifact
        working-directory: ./backend
        run: |
          mkdir -p ../backend-deploy
          cp -r dist                    ../backend-deploy/
          cp -r migrations              ../backend-deploy/
          cp package*.json              ../backend-deploy/
          cp startup.sh                 ../backend-deploy/
          chmod +x                      ../backend-deploy/startup.sh
          echo "=== Artifact contents ==="
          ls -la ../backend-deploy/
          echo "Deployment artifact ready"

      - name: Deploy via Kudu ZipDeploy
        env:
          KUDU_USER: ${{ secrets.AZURE_KUDU_USER }}
          KUDU_PASS: ${{ secrets.AZURE_KUDU_PASS }}
        run: |
          set -e

          SCM="https://portal-ti-backend.scm.azurewebsites.net"
          APP="https://portal-ti-backend.azurewebsites.net"

          echo "=== Step 1: Configure app settings ==="
          curl -s -X POST \
            "${SCM}/api/settings" \
            --user "${KUDU_USER}:${KUDU_PASS}" \
            -H "Content-Type: application/json" \
            -d '{
              "CORS_ORIGIN":"https://green-ocean-096bd050f.2.azurestaticapps.net",
              "SCM_DO_BUILD_DURING_DEPLOYMENT":"false",
              "WEBSITE_NODE_DEFAULT_VERSION":"~20"
            }'

          echo "=== Step 2: Create zip package ==="
          cd backend-deploy
          zip -r ../deploy.zip . -q
          cd ..

          echo "=== Step 3: ZipDeploy via Kudu API ==="
          curl -s -X POST \
            "https://portal-ti-backend.scm.azurewebsites.net/api/zipdeploy" \
            --user "${KUDU_USER}:${KUDU_PASS}" \
            -H "Content-Type: application/zip" \
            --data-binary "@deploy.zip" \
            -w "\nHTTP: %{http_code}\n"

          echo "=== ZipDeploy complete ==="

      - name: Force npm install via Kudu
        env:
          KUDU_USER: ${{ secrets.AZURE_KUDU_USER }}
          KUDU_PASS: ${{ secrets.AZURE_KUDU_PASS }}
        run: |
          echo "=== Forcing npm install --production on server ==="
          curl -s -X POST \
            "https://portal-ti-backend.scm.azurewebsites.net/api/command" \
            --user "${KUDU_USER}:${KUDU_PASS}" \
            -H "Content-Type: application/json" \
            -d '{"command":"npm install --production","dir":"/home/site/wwwroot"}' \
            --max-time 300 \
            -w "\nHTTP: %{http_code}\n"

          echo "=== npm install complete ==="

      - name: Restart app
        env:
          KUDU_USER: ${{ secrets.AZURE_KUDU_USER }}
          KUDU_PASS: ${{ secrets.AZURE_KUDU_PASS }}
        run: |
          echo "=== Restarting app ==="
          curl -s -X POST \
            "https://portal-ti-backend.scm.azurewebsites.net/api/processes/0/stop" \
            --user "${KUDU_USER}:${KUDU_PASS}" \
            -w "\nHTTP: %{http_code}\n"
          sleep 15
          echo "=== App restarted ==="
