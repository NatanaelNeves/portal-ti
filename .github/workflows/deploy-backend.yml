name: Deploy Backend to Azure Web App  # triggered after secrets configured

on:
  push:
    branches: [ main ]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

concurrency:
  group: deploy-backend
  cancel-in-progress: true

env:
  NODE_VERSION: '20.x'

jobs:
  build-and-deploy-backend:
    runs-on: ubuntu-latest
    name: Build and Deploy Backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: ./backend
        run: npm ci

      - name: Build TypeScript
        working-directory: ./backend
        run: |
          npm run build
          echo "=== dist/ contents ==="
          ls -la dist/
          ls dist/index.js && echo "dist/index.js OK" || (echo "dist/index.js MISSING" && exit 1)

      - name: Install production dependencies only
        working-directory: ./backend
        run: |
          rm -rf node_modules
          npm ci --omit=dev

      - name: Package deployment artifact
        run: |
          mkdir -p backend-deploy
          cp -r backend/dist         backend-deploy/
          cp -r backend/node_modules backend-deploy/
          cp backend/package*.json   backend-deploy/
          cd backend-deploy
          zip -r ../backend-deploy.zip .
          echo "=== Artifact size ==="
          ls -lh ../backend-deploy.zip

      - name: Configure Azure App Settings via Kudu
        env:
          KUDU_USER: ${{ secrets.AZURE_KUDU_USER }}
          KUDU_PASS: ${{ secrets.AZURE_KUDU_PASS }}
        run: |
          echo "=== Setting app config ==="
          curl -s -X POST \
            "https://portal-ti-backend.scm.azurewebsites.net/api/settings" \
            --user "${KUDU_USER}:${KUDU_PASS}" \
            -H "Content-Type: application/json" \
            -d '{
              "CORS_ORIGIN":"https://green-ocean-096bd050f.2.azurestaticapps.net",
              "SCM_DO_BUILD_DURING_DEPLOYMENT":"false",
              "WEBSITE_RUN_FROM_PACKAGE":"0"
            }' \
            -w "\nHTTP Status: %{http_code}\n"

      - name: Force-clear stuck deployment lock
        env:
          KUDU_USER: ${{ secrets.AZURE_KUDU_USER }}
          KUDU_PASS: ${{ secrets.AZURE_KUDU_PASS }}
        run: |
          echo "=== Killing Kudu SCM process to release all locks ==="
          curl -s -X DELETE \
            "https://portal-ti-backend.scm.azurewebsites.net/api/processes/0" \
            --user "${KUDU_USER}:${KUDU_PASS}" \
            -w "\nKill SCM HTTP Status: %{http_code}\n" || true
          
          echo "=== Waiting 15s for SCM restart ==="
          sleep 15
          
          echo "=== Deleting deployment lock files via command API ==="
          curl -s -X POST \
            "https://portal-ti-backend.scm.azurewebsites.net/api/command" \
            --user "${KUDU_USER}:${KUDU_PASS}" \
            -H "Content-Type: application/json" \
            -d '{"command":"rm -rf /home/site/locks/deployment && echo LOCKS_CLEARED","dir":"/home"}' \
            -w "\nCommand HTTP Status: %{http_code}\n" || true
          
          echo "=== Verifying SCM is responding ==="
          for i in 1 2 3 4 5; do
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" \
              "https://portal-ti-backend.scm.azurewebsites.net/api/deployments" \
              --user "${KUDU_USER}:${KUDU_PASS}")
            echo "Check $i: HTTP $HTTP"
            if [ "$HTTP" = "200" ]; then
              echo "SCM is back online!"
              break
            fi
            sleep 5
          done

      - name: Deploy to Azure Web App (OneDeploy API)
        env:
          KUDU_USER: ${{ secrets.AZURE_KUDU_USER }}
          KUDU_PASS: ${{ secrets.AZURE_KUDU_PASS }}
        run: |
          echo "=== Starting deploy via OneDeploy API ==="
          HTTP_CODE=$(curl -s -o /tmp/deploy-response.txt -w "%{http_code}" \
            -X POST \
            "https://portal-ti-backend.scm.azurewebsites.net/api/publish?type=zip&async=true&restart=true&clean=true" \
            --user "${KUDU_USER}:${KUDU_PASS}" \
            --data-binary @backend-deploy.zip \
            -H "Content-Type: application/zip")
          
          echo "HTTP Status: $HTTP_CODE"
          cat /tmp/deploy-response.txt 2>/dev/null || true
          echo ""
          
          if [ "$HTTP_CODE" = "202" ] || [ "$HTTP_CODE" = "200" ]; then
            echo "Deploy request accepted!"
          elif [ "$HTTP_CODE" = "409" ]; then
            echo "409 still happening — trying zipdeploy as fallback..."
            HTTP_CODE=$(curl -s -o /tmp/deploy-response.txt -w "%{http_code}" \
              -X POST \
              "https://portal-ti-backend.scm.azurewebsites.net/api/zipdeploy?isAsync=true" \
              --user "${KUDU_USER}:${KUDU_PASS}" \
              --data-binary @backend-deploy.zip \
              -H "Content-Type: application/zip")
            echo "Fallback HTTP Status: $HTTP_CODE"
            if [ "$HTTP_CODE" != "202" ] && [ "$HTTP_CODE" != "200" ]; then
              cat /tmp/deploy-response.txt 2>/dev/null || true
              echo "All deploy methods failed. You may need to restart the App Service from Azure Portal."
              exit 1
            fi
          else
            cat /tmp/deploy-response.txt 2>/dev/null || true
            echo "Unexpected status $HTTP_CODE"
            exit 1
          fi
          
          # Poll deployment status (max 5 minutes)
          echo "=== Polling deployment status ==="
          for i in $(seq 1 30); do
            sleep 10
            DEPLOY_INFO=$(curl -s \
              "https://portal-ti-backend.scm.azurewebsites.net/api/deployments/latest" \
              --user "${KUDU_USER}:${KUDU_PASS}")
            STATUS=$(echo "$DEPLOY_INFO" | grep -o '"status":[0-9]*' | grep -o '[0-9]*' || echo "unknown")
            COMPLETE=$(echo "$DEPLOY_INFO" | grep -o '"complete":[a-z]*' | grep -o '[a-z]*$' || echo "unknown")
            echo "Poll $i/30 — status: $STATUS, complete: $COMPLETE"
            
            if [ "$COMPLETE" = "true" ]; then
              if [ "$STATUS" = "4" ]; then
                echo "Deploy succeeded!"
                exit 0
              else
                echo "Deploy completed with error status: $STATUS"
                echo "$DEPLOY_INFO" | head -c 1000
                exit 1
              fi
            fi
          done
          echo "Deploy polling timed out (5 min) — check Azure portal"
          exit 1
